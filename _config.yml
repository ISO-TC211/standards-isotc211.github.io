title: ISO/TC 211 Normative Statements & Conformance
title_html: "ISO/TC 211 Normative Statements & Conformance"
brand_sub: "Harmonized Resources Maintenance Agency"

theme: jekyll-theme-isotc211

author: "ISO/TC 211"
email: open.source@ribose.com

description: >-
  Normative statements and conformance repository for
  geographic information technology from ISO/TC 211
  Geographic information/Geomatics.

tagline: >-
  Normative statements and conformance repository for geographic information technology

committee:
  id: 211
  name: Geographic information/Geomatics
  home: https://committee.iso.org/home/tc211

collections:
  pages:
    output: true
    permalink: /:path/

markdown: kramdown

plugins:
  - jekyll/vite
  - jekyll-feed
  - jekyll-data
  - jekyll-asciidoc

defaults: []

nav:
  - title: News
    url: /news/
  - title: About
    url: /about/
  - title: ISO/TC 211 Resources
    url: https://www.isotc211.org

footer_links:
  - title: Main Site
    url: https://www.isotc211.org
  - title: Geodetic Registry
    url: https://geodetic.isotc211.org/
  - title: UML Models
    url: http://iso.sparxcloud.com/index.php
  - title: Schemas
    url: https://schemas.isotc211.org
  - title: Terminology
    url: https://isotc211.geolexica.org/
  - title: Ontologies
    url: https://def.isotc211.org
  - title: Registries
    url: https://registry.isotc211.org/

social:
  links:
    - url: https://twitter.com/ISOTC211
    - url: https://github.com/ISO-TC211

powered_by:
  url: https://open.ribose.com
  title: Ribose
  logo_path: /assets/logo-ribose.svg

source: source

exclude:
  - Gemfile
  - Gemfile.lock
  - Makefile
  - package.json
  - package-lock.json
  - node_modules
  - vendor
  - .sass-cache
  - vite.config.ts
  - postcss.config.js
  - bin
  - _frontend
  - config/vite.json
