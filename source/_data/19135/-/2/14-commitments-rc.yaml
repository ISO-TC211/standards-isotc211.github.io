---
normative_statements_classes:
- identifier: "/req/commitments"
  name: Register commitments
  subject: register commitments
  description: |
    Register commitments are optional guarantees that a register may provide
    to its users regarding the management, accessibility, persistence,
    integrity, transparency, and traceability of its content. These
    commitments are defined in the register specification and help establish
    trust and reliability expectations based on the conceptual model.
  normative_statements:
  - identifier: "/req/commitments/definition"
    name: Definition of register commitments in register specification
    statement: |
      The register specification may define commitments regarding
      accessibility, persistence, retention, traceability, and transparency of
      register content and operations, including their scope and limitations,
      with sufficient detail to allow users to understand and assess the
      commitments.

      Documentation shall include:

      . types of commitments and the commitment levels, if any;
      . scope of application;
      . circumstances where commitments do not apply;
      . expected outcomes.
    guidance:
    - |
      Register commitments are optional guarantees that help establish user
      trust and operational expectations. The framework defines the following
      kinds of commitments:

      . accessibility of its managed content;
      . persistence, retention and traceability of its managed content;
      . transparency of its managed content.

      Additional commitments may be defined by the register specification to
      address specific user needs or regulatory requirements.
  - identifier: "/req/commitments/access"
    name: Definition of access commitments in register specification
    statement: The register specification shall define access commitments, including
      metadata access, content access, and historic access, if any are made.
    guidance:
    - |
      Access commitments ensure that register content is accessible to users
      through the defined identifiers and resolution mechanisms. These
      commitments are hierarchical levels in increasing order of accessibility:

      . metadata access;
      . content access;
      . historic access.
  - identifier: "/req/commitments/metadata-access"
    name: Metadata access commitment implementation
    statement: When metadata access commitment is defined, metadata on the content
      of the register, including concepts, concept versions, register item classes,
      and register items, shall be accessible through their identifiers.
    guidance:
    - |
      Metadata access provides access to descriptive information and
      administrative status information. This is the most basic level of
      access commitment.
  - identifier: "/req/commitments/content-access"
    name: Content access commitment implementation
    statement: When content access commitment is defined, content of the register,
      including concepts, concept versions, register item classes, and register items,
      shall be accessible through their identifiers.
    guidance:
    - |
      Content access provides access to the actual information stored in the
      register. This commitment includes metadata access capabilities.
  - identifier: "/req/commitments/historic-access"
    name: Historic access commitment implementation
    statement: When historic access commitment is defined, history of changes to the
      register content, including change objects and relation information, shall be
      accessible through their identifiers.
    guidance:
    - |
      Historic access provides access to the historical information stored in
      the register. This commitment includes both metadata and content access
      capabilities.
  - identifier: "/req/commitments/persistence"
    name: Definition of persistence, integrity, and traceability commitments in register
      specification
    statement: The register specification shall define persistence, integrity, and
      traceability commitments, specifying what data elements are retained, how they
      are preserved, and how changes can be tracked over time, if any are made.
    guidance:
    - |
      These commitments are interconnected since traceability requires retention,
      and integrity depends on both persistence and traceability mechanisms.
      The following hierarchical levels are defined in increasing order of capability:

      . identifier persistence;
      . metadata persistence and retention;
      . content persistence and retention;
      . historic persistence with complete traceability.

      Identifier persistence is a basic level required by the framework, while
      higher levels are optional.
  - identifier: "/req/commitments/identifier-persistence"
    name: Identifier persistence commitment implementation
    statement: When identifier persistence commitment is defined, identifiers in a
      register shall be persistent and consistent, even when content is modified,
      superseded, redacted, or deleted.
    guidance:
    - |
      This is the foundational level that ensures stable references to register
      content. Referential integrity is maintained for relations between
      register entities.
  - identifier: "/req/commitments/metadata-persistence"
    name: Metadata persistence and retention commitment implementation
    statement: |
      When metadata persistence and retention commitments are defined:

      . descriptive metadata, status, relation information, metadata of
      content and concept changes shall be preserved;
      . whether managed content is removed depends on the actual commitments
      made.
    guidance:
    - |
      A register that guarantees metadata integrity is called a "traceable
      register". This level ensures that the register can be rewound to a
      particular point in time at the metadata level. Change date and time,
      status and relation metadata remain accessible when content is
      redacted or deleted. There is no commitment to retain content changes.
  - identifier: "/req/commitments/content-persistence"
    name: Content persistence and retention commitment implementation
    statement: When content persistence and retention commitment is defined, concepts,
      concept versions, register item classes, register items, and their statuses
      and relations shall be preserved except in cases explicitly described in the
      register specification.
    guidance:
    - |
      A register that guarantees content persistence is called a "persistent
      register". This level enables rewinding to a particular point in time
      at the content level. Managed content is retained except for security
      concerns, regulatory exceptions, or legal obligations.
  - identifier: "/req/commitments/historic-persistence"
    name: Historic persistence with complete traceability commitment implementation
    statement: When historic persistence with complete traceability commitment is
      defined, complete preservation of all content, metadata, and change objects
      shall be maintained with no exceptions, combined with complete change tracking
      and audit capabilities.
    guidance:
    - |
      A register that guarantees historic persistence is called an "append-only
      register". Data is only added and superseded content is never removed,
      implementing append-only storage. Change objects are created and retained
      for all modifications. Full reconstruction capability allows the register
      state to be recreated at any point in time. An append-only register can
      be implemented through append-only data storage such as strongly-consistent
      ledgers.
  - identifier: "/req/commitments/transparency"
    name: Definition of transparency commitments in register specification
    statement: The register specification shall define transparency commitments, including
      metadata transparency, content transparency, or historic transparency, if any
      are made.
    guidance:
    - |
      Transparency commitments ensure that the register's operations and content
      are open and accessible to users. These commitments are hierarchical
      levels in increasing order of transparency:

      . metadata transparency;
      . content transparency;
      . historic transparency (transparent register).

      Transparency does not mean that all content is publicly available, but
      rather that the register provides transparency to its intended audience.
  - identifier: "/req/commitments/metadata-transparency"
    name: Metadata transparency commitment implementation
    statement: When metadata transparency commitment is defined, metadata of content
      and concept changes shall be made available, including date/time and justification
      of content changes.
    guidance:
    - |
      No commitment to retention of content changes. This is the most basic
      level of transparency commitment.
  - identifier: "/req/commitments/content-transparency"
    name: Content transparency commitment implementation
    statement: When content transparency commitment is defined, managed content changes
      shall be made available, including date/time and justification of content changes,
      except in cases explicitly described in the register specification.
    guidance:
    - |
      Content changes are always retained and made available except for
      security concerns, regulatory exceptions, or legal obligations. This
      commitment includes metadata transparency capabilities.
  - identifier: "/req/commitments/historic-transparency"
    name: Historic transparency commitment implementation
    statement: When historic transparency commitment is defined, all changes shall
      be made available, including date/time and justification of content changes,
      except in cases explicitly described in the register specification.
    guidance:
    - |
      A register that guarantees historic transparency is called a "transparent
      register". Change history is always retained and made available except
      for security concerns, regulatory exceptions, or legal obligations.
  - identifier: "/req/commitments/implementation"
    name: Implementation to satisfy commitments
    statement: A register may define commitments that it is required to comply with,
      and if commitments are defined, there shall be a method for achieving compliance
      with those commitments.
    guidance:
    - |
      Compliance with commitments is not a requirement of the framework, but
      rather an optional feature that can be implemented by the register owner
      to address specific user needs or regulatory requirements. Documentation
      on the implementation of commitments, audits and assessments are all
      possible measures to ensure transparency and accountability.
  - identifier: "/req/commitments/documentation"
    name: Documented implementation documentation of commitments
    statement: The register specification shall describe its implementation for achieving
      compliance with the stated commitments in the register specification.
    guidance:
    - |
      The register specification should provide sufficient detail on how the
      commitments are implemented, including procedures, processes, and
      responsibilities. This documentation helps users understand how the
      commitments are met and what to expect from the register.
