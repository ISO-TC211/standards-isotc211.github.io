---
conformance_classes:
- identifier: "/conf/identifiers"
  name: Identifier implementation and governance
  target: "/req/identifiers"
  tests:
  - identifier: "/conf/identifiers/object-identifier-scheme"
    name: Object identifier scheme definition validation
    targets:
    - "/req/identifiers/object-identifier-scheme"
    type: Validation
  - identifier: "/conf/identifiers/functional-identifier-scheme"
    name: Functional identifier scheme definition validation
    targets:
    - "/req/identifiers/functional-identifier-scheme"
    type: Validation
  - identifier: "/conf/identifiers/functional-identifier-hierarchy"
    name: Functional identifier hierarchy support verification
    targets:
    - "/req/identifiers/functional-identifier-hierarchy"
    type: Conformance
    examples:
    - Verify URI-based and URN-based identifiers that demonstrate domain or namespace
      with hierarchical path structures.
  - identifier: "/conf/identifiers/functional-identifier-persistence"
    name: Functional identifier persistence verification
    targets:
    - "/req/identifiers/functional-identifier-persistence"
    type: Conformance
  - identifier: "/conf/identifiers/uniqueness"
    name: Identifier uniqueness verification
    targets:
    - "/req/identifiers/uniqueness"
    type: Conformance
  - identifier: "/conf/identifiers/register-identifier"
    name: Register global identifier verification
    targets:
    - "/req/identifiers/register-identifier"
    type: Validation
    examples:
    - Validate URI identifiers through DNS resolution and domain verification.
    - Confirm URN namespace registration through IANA records.
  - identifier: "/conf/identifiers/component-identification"
    name: Component identification capability verification
    targets:
    - "/req/identifiers/component-identification"
    type: Conformance
