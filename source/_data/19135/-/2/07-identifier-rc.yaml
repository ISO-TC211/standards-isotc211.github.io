---
normative_statements_classes:
- identifier: "/req/identifiers"
  name: Identifier implementation and governance
  subject: identifier
  normative_statements:
  - identifier: "/req/identifiers/object-identifier-scheme"
    name: Definition of object identifier scheme
  - identifier: "/req/identifiers/functional-identifier-scheme"
    name: Definition of functional identifier scheme
  - identifier: "/req/identifiers/functional-identifier-hierarchy"
    name: Functional identifier scheme supports hierarchical specification
    examples:
    - URI, URN and URLs are possible identification schemes that support a hierarchical
      specification.
  - identifier: "/req/identifiers/functional-identifier-persistence"
    name: Functional identifiers are persistent in semantics
  - identifier: "/req/identifiers/uniqueness"
    name: Identifiers are unique
  - identifier: "/req/identifiers/register-identifier"
    name: Register is assigned a globally unique identifier
    examples:
    - The URI identifier:[https://geodetic.isotc211.org] is a unique identifier for
      a register, as it is namespaced by the domain name `isotc211.org`, a globally
      unique name registered in the global domain name system (DNS) managed by ICANN,
      and the hostname `geodetic` of that domain is registered in the DNS managed
      by ISO/TC 211.
    - The URN namespace identifier:[urn:isbn] is a unique identifier for a register,
      as the URN namespace identifier:[urn:isbn] namespace is globally unique, being
      registered at IANA, the authoritative organization for URNs.
  - identifier: "/req/identifiers/component-identification"
    name: Identification of components
