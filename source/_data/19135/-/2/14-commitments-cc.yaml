---
conformance_classes:
- identifier: "/conf/commitments"
  name: Register commitments
  target: "/req/commitments"
  tests:
  - identifier: "/conf/commitments/definition"
    name: Commitment definition
    targets:
    - "/req/commitments/definition"
    type: Validation
  - identifier: "/conf/commitments/access"
    name: Access commitment validation
    targets:
    - "/req/commitments/access"
    - "/req/commitments/metadata-access"
    - "/req/commitments/content-access"
    - "/req/commitments/historic-access"
    type: Conformance
  - identifier: "/conf/commitments/persistence"
    name: Persistence commitment validation
    targets:
    - "/req/commitments/persistence"
    - "/req/commitments/identifier-persistence"
    - "/req/commitments/metadata-persistence"
    - "/req/commitments/content-persistence"
    - "/req/commitments/historic-persistence"
    type: Conformance
  - identifier: "/conf/commitments/transparency"
    name: Transparency commitment validation
    targets:
    - "/req/commitments/transparency"
    - "/req/commitments/metadata-transparency"
    - "/req/commitments/content-transparency"
    - "/req/commitments/historic-transparency"
    type: Conformance
  - identifier: "/conf/commitments/implementation"
    name: Implementation verification
    targets:
    - "/req/commitments/implementation"
    type: Validation
  - identifier: "/conf/commitments/documentation"
    name: Implementation documentation verification
    targets:
    - "/req/commitments/documentation"
    type: Validation
