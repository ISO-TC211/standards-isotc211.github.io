    name: Verify through XSD
    targets:
    - "/req/valid-instance/xsd"
    type: Conformance
  - identifier: "/conf/valid-instance/schematron"
    name: Verify through Schematron
    targets:
    - "/req/valid-instance/schematron"
    type: Conformance
- identifier: "/conf/extended-types-xml"
  name: XML package for Base Types Extended
  target: "/req/extended-types-xml"
  dependencies:
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/extended-types-xml/schema-valid"
    name: Validate against gcx.xsd
    targets:
    - "/req/extended-types-xml/valid"
- identifier: "/conf/gml-wrapper-xml"
  name: XML package for GML Wrapper
  target: "/req/gml-wrapper-xml"
  dependencies:
  - "/conf/metadata-xml/basic"
  tests:
  - identifier: "/conf/gml-wrapper-xml/schema-valid"
    name: Validate against gmw.xsd
    targets:
    - "/req/gml-wrapper-xml/valid"
- identifier: "/conf/extended-metadata-xml"
  name: Validation of XML metadata instance with extended content model
  target: "/req/extended-metadata-xml"
  dependencies:
  - "/conf/metadata-minimal-xml"
  - "/conf/metadata-xml/metadata-extension"
  tests:
  - identifier: "/conf/extended-metadata-xml/schema-valid"
    name: Validate using Schematron
    targets:
    - "/req/extended-metadata-xml/valid"
    type: Validation
  - identifier: "/conf/extended-metadata-xml/new-section"
    name: Check extension elements namespaces
    targets:
    - "/req/extended-metadata-xml/new-section"
    type: Validation
  - identifier: "/conf/extended-metadata-xml/validation"
    name: Check whether XML instance can be validated
    targets:
    - "/req/extended-metadata-xml/validation"
    type: Validation
  - identifier: "/conf/extended-metadata-xml/new-codelist"
    name: Check codelists implementation
    targets:
    - "/req/extended-metadata-xml/new-codelist"
    type: Validation
  - identifier: "/conf/extended-metadata-xml/new-element"
    name: Confirm new elements being subclasses
    targets:
    - "/req/extended-metadata-xml/new-element"
    type: Validation
  - identifier: "/conf/extended-metadata-xml/iso-type"
    name: Check `isoType` attribute
    targets:
    - "/req/extended-metadata-xml/iso-type"
    type: Validation
  - identifier: "/conf/extended-metadata-xml/extension-by-restriction"
    name: Verify validation process for profile restrictions
    targets:
    - "/req/extended-metadata-xml/extension-by-restriction"
    type: Validation
