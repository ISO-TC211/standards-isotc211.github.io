  - "/conf/gml-wrapper-xml"
  tests:
  - identifier: "/conf/metadata-xml/geospatial-extent/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/extent/valid"
  - identifier: "/conf/metadata-xml/geospatial-extent/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/extent/value-required"
