---
conformance_classes:
- identifier: "/conf/metadata-xml/application"
  name: Validation of XML instance for metadata application information
  target: "/req/metadata-xml/application"
  dependencies:
  - "/conf/extended-types-xml"
  - "/conf/extended-metadata-xml"
  tests:
  - identifier: "/conf/metadata-xml/application/valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/application/valid"
    type: Validation
- identifier: "/conf/metadata-xml/basic"
  name: Validation of XML instance for metadata basic information
  target: "/req/metadata-xml/basic"
  dependencies:
  - "/conf/metadata-minimal-xml"
  - "/conf/metadata-xml/common"
  - "/conf/metadata-xml/multilingual"
  tests:
  - identifier: "/conf/metadata-xml/basic/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/basic/valid"
  - identifier: "/conf/metadata-xml/basic/identification"
    name: Verify presence of identification information
    targets:
    - "/req/metadata-xml/basic/identification"
  - identifier: "/conf/metadata-xml/basic/parent-metadata"
    name: Verify identification information exists of upper-level object if exists
    targets:
    - "/req/metadata-xml/basic/parent-metadata"
  - identifier: "/conf/metadata-xml/basic/language"
    name: Verify presence of language information
    targets:
    - "/req/metadata-xml/basic/language"
  - identifier: "/conf/metadata-xml/basic/character-encoding"
    name: Verify presence of character encoding information
    targets:
    - "/req/metadata-xml/basic/character-encoding"
  - identifier: "/conf/metadata-xml/basic/metadata-scope-name"
    name: Verify presence of metadata scope name
    targets:
    - "/req/metadata-xml/basic/metadata-scope-name"
- identifier: "/conf/metadata-xml/identification"
  name: Validation of XML instance for identification information
  target: "/req/metadata-xml/identification"
  dependencies:
  - "/conf/metadata-minimal-xml"
  - "/conf/metadata-xml/common"
  - "/conf/metadata-xml/citation"
  - "/conf/gml-wrapper-xml"
  tests:
  - identifier: "/conf/metadata-xml/identification/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/identification/valid"
  - identifier: "/conf/metadata-xml/identification/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/identification/topic-category"
    - "/req/metadata-xml/identification/associated-resource"
  - identifier: "/conf/metadata-xml/identification/citation"
    name: Check MD_Identification property "citation"
    targets:
    - "/req/metadata-xml/identification/citation"
  - identifier: "/conf/metadata-xml/identification/abstract"
    name: Validate presence of MD_Identification property "abstract"
    targets:
    - "/req/metadata-xml/identification/abstract"
  - identifier: "/conf/metadata-xml/identification/representative-fraction-denominator"
    name: Validate value of MD_RepresentativeFraction property "denominator"
    targets:
    - "/req/metadata-xml/identification/representative-fraction-denominator"
- identifier: "/conf/metadata-xml/constraints"
  name: Validation of XML instance for constraint information
  target: "/req/metadata-xml/constraints"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/constraints/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/constraints/valid"
  - identifier: "/conf/metadata-xml/constraints/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/constraints/legal-constraints"
    - "/req/metadata-xml/constraints/other-restrictions"
    - "/req/metadata-xml/constraints/releasability"
- identifier: "/conf/metadata-xml/lineage"
  name: Validation of XML instance for resource lineage information
  target: "/req/metadata-xml/lineage"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  - "/conf/gml-wrapper-xml"
  - "/conf/metadata-extensions/extended-lineage"
  tests:
  - identifier: "/conf/metadata-xml/lineage/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/lineage/valid"
  - identifier: "/conf/metadata-xml/lineage/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/lineage/lineage-content"
    - "/req/metadata-xml/lineage/source"
- identifier: "/conf/metadata-xml/maintenance"
  name: Validation of XML instance for maintenance information
  target: "/req/metadata-xml/maintenance"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/maintenance/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/maintenance/valid"
  - identifier: "/conf/metadata-xml/maintenance/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/maintenance/frequency"
- identifier: "/conf/metadata-xml/spatial-representation"
  name: Validation of XML instance for spatial representation information
  target: "/req/metadata-xml/spatial-representation"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  - "/conf/gml-wrapper-xml"
  tests:
  - identifier: "/conf/metadata-xml/spatial-representation/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/spatial-representation/valid"
  - identifier: "/conf/metadata-xml/spatial-representation/georectified-check-point-description-value"
    name: Validate MD_Georectified instances with "checkPointAvailability" property
      provides description
    targets:
    - "/req/metadata-xml/spatial-representation/georectified-check-point-description-value"
  - identifier: "/conf/metadata-xml/spatial-representation/geometric-object-count-value"
    name: Validate value of MD_GeometricObjects property "geometricObjectsCount"
    targets:
    - "/req/metadata-xml/spatial-representation/geometric-object-count-value"
- identifier: "/conf/metadata-xml/reference-system"
  name: Validation of XML instance for reference system information
  target: "/req/metadata-xml/reference-system"
  dependencies:
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/reference-system/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/reference-system/valid"
  - identifier: "/conf/metadata-xml/reference-system/identifier"
    name: Valid MD_ReferenceSystem with identification properties
    targets:
    - "/req/metadata-xml/reference-system/identifier"
  - identifier: "/conf/metadata-xml/reference-system/coordinate-epoch"
    name: Valid MD_ReferenceSystem with property "crs"
    targets:
    - "/req/metadata-xml/reference-system/coordinate-epoch"
- identifier: "/conf/metadata-xml/content"
  name: Validation of XML instance for content information
  target: "/req/metadata-xml/content"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  - "/conf/metadata-xml/multilingual"
  - "/conf/gml-wrapper-xml"
  tests:
  - identifier: "/conf/metadata-xml/content/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/content/valid"
  - identifier: "/conf/metadata-xml/content/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/content/inline-feature-catalogue"
    - "/req/metadata-xml/content/dimension-units"
    - "/req/metadata-xml/content/feature-catalogue"
  - identifier: "/conf/metadata-xml/content/feature-catalogue"
    name: Validate feature catalogue identification
    targets:
    - "/req/metadata-xml/content/feature-catalogue"
  - identifier: "/conf/metadata-xml/content/image-illumination-elevation-angle-value"
    name: Value of MD_ImageDescription property "illuminationElevationAngle"
    targets:
    - "/req/metadata-xml/content/image-illumination-elevation-angle-value"
  - identifier: "/conf/metadata-xml/content/image-illumination-azimuth-angle-value"
    name: Value of MD_ImageDescription property "illuminationAzimuthAngle"
    targets:
    - "/req/metadata-xml/content/image-illumination-azimuth-angle-value"
  - identifier: "/conf/metadata-xml/content/image-cloud-cover-percent-value"
    name: Value of MD_ImageDescription property "cloudCoverPercent"
    targets:
    - "/req/metadata-xml/content/image-cloud-cover-percent-value"
  - identifier: "/conf/metadata-xml/content/band-units-value"
    name: Validate MD_Band property "units" value
    targets:
    - "/req/metadata-xml/content/band-units-value"
  - identifier: "/conf/metadata-xml/content/feature-type-instance-count"
    name: Validate MD_FeatureTypeInfo property "featureInstanceCount" value
    targets:
    - "/req/metadata-xml/content/feature-type-instance-count"
- identifier: "/conf/metadata-xml/portrayal-catalogue"
  name: Validation of XML instance for portrayal catalogue information
  target: "/req/metadata-xml/portrayal-catalogue"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/portrayal-catalogue/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/portrayal-catalogue/valid"
- identifier: "/conf/metadata-xml/distribution"
  name: Validation of XML instance for distribution information
  target: "/req/metadata-xml/distribution"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
