  - identifier: "/conf/metadata-xml/extent/geographic-bounding-box"
    name: Validate values of EX_GeographicBoundingBox
    targets:
    - "/req/metadata-xml/extent/geographic-bounding-box"
- identifier: "/conf/metadata-xml/citation"
  name: Validation of XML instance for citation, responsibility and party information
  target: "/req/metadata-xml/citation"
  dependencies:
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/citation/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/citation/valid"
  - identifier: "/conf/metadata-xml/citation/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/citation/individual-name"
    - "/req/metadata-xml/citation/organisation-name"
  - identifier: "/conf/metadata-xml/citation/online-resource"
    name: Valid values of CI_OnlineResource
    targets:
    - "/req/metadata-xml/citation/online-resource"
- identifier: "/conf/metadata-xml/common"
  name: Validation of XML instance for common classes
  target: "/req/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/common/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/common/valid"
- identifier: "/conf/metadata-xml/multilingual"
  name: Validation of XML instance for multilingual support (language localization)
  target: "/req/metadata-xml/multilingual"
  tests:
  - identifier: "/conf/metadata-xml/multilingual/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/multilingual/valid"
  - identifier: "/conf/metadata-xml/multilingual/language-code"
    name: Language code from ISO 639-2
    targets:
    - "/req/metadata-xml/multilingual/language-code"
  - identifier: "/conf/metadata-xml/multilingual/country-code"
    name: Country code from ISO 3166-1
    targets:
    - "/req/metadata-xml/multilingual/country-code"
  - identifier: "/conf/metadata-xml/multilingual/character-set-code"
    name: Character set code from IANA charset register
    targets:
    - "/req/metadata-xml/multilingual/character-set-code"
- identifier: "/conf/metadata-xml/acquisition"
