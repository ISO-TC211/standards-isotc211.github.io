- identifier: "/conf/metadata-xml/application-schema"
  name: Validation of XML instance for application schema information
  target: "/req/metadata-xml/application-schema"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  tests:
  - identifier: "/conf/metadata-xml/application-schema/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/application-schema/valid"
- identifier: "/conf/metadata-xml/service-metadata"
  name: Validation of XML instance for service metadata information
  target: "/req/metadata-xml/service-metadata"
  dependencies:
  - "/conf/metadata-xml/citation"
  - "/conf/metadata-xml/common"
  - "/conf/metadata-xml/distribution"
  tests:
  - identifier: "/conf/metadata-xml/service-metadata/schema-valid"
    name: Validate with XSD
    targets:
    - "/req/metadata-xml/service-metadata/valid"
  - identifier: "/conf/metadata-xml/service-metadata/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/service-metadata/service-keyword"
