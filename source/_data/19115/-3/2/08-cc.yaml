  - identifier: "/conf/metadata-xml/distribution/schematron-rules"
    name: Validate with Schematron
    targets:
    - "/req/metadata-xml/distribution/density-units"
  - identifier: "/conf/metadata-xml/distribution/transfer-option-size-value"
    name: Validate transferSize value of MD_DigitalTransferOption
    targets:
    - "/req/metadata-xml/distribution/transfer-option-size-value"
  - identifier: "/conf/metadata-xml/distribution/density-value"
    name: Validate MD_Medium density value
    targets:
    - "/req/metadata-xml/distribution/density-value"
  - identifier: "/conf/metadata-xml/distribution/volumes-value"
    name: Valid MD_Medium volumes value
    targets:
    - "/req/metadata-xml/distribution/volumes-value"
