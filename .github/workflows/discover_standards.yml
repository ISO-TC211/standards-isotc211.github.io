name: discover_standards

on:
  schedule:
    - cron: '0 2 * * 0'  # Weekly Sunday 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'

      - name: Discover new standards
        run: ruby script/discover_standards.rb | tee discover_output.txt

      - name: Check for new standards
        id: check
        run: |
          if grep -q "NEW_STANDARDS_COUNT=0" discover_output.txt; then
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing open discover PR
        if: steps.check.outputs.has_new == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(gh pr list --search "auto-discover-standards in:title state:open" --json number -q '.[0].number')
          if [ -n "$PR_NUM" ]; then
            echo "pr_number=$PR_NUM" >> "$GITHUB_OUTPUT"
            echo "has_existing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_existing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: >-
          steps.check.outputs.has_new == 'true' &&
          steps.existing.outputs.has_existing != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-discover-standards-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add source/_data/tc211_standards.yaml
          COUNT=$(grep "NEW_STANDARDS_COUNT=" discover_output.txt | cut -d= -f2)
          git commit -m "Update TC 211 standards inventory (+${COUNT} new)"
          git push origin "$BRANCH"

          {
            echo "## New ISO/TC 211 Standards Discovered"
            echo ""
            echo "The following standards have been discovered from [ISO public metadata](https://isopublicstorageprod.blob.core.windows.net/opendata/_latest/iso_deliverables_metadata/json/iso_deliverables_metadata.jsonl)."
            echo ""
            echo "Standards authors are invited to provide machine-readable requirements and conformance data in the YAML format described in [\`README.adoc\`](README.adoc)."
            echo ""
            echo "### Standards Awaiting Data"
            echo ""
            sed -n '2,$p' discover_output.txt
            echo ""
            echo "---"
            echo "*Auto-generated by the [discover_standards workflow](.github/workflows/discover_standards.yml).*"
          } > /tmp/pr_body.md

          DATE=$(date +%Y-%m-%d)
          gh pr create \
            --title "New ISO/TC 211 standards discovered ($DATE)" \
            --body-file /tmp/pr_body.md
